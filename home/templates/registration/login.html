<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – Anuja Mestry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --card: #16161f;
            --border: #24242f;
            --accent: #6ee7b7;
            --accent2: #818cf8;
            --text: #f0f0f5;
            --muted: #8888a0;
            --error: #f87171;
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── BACKGROUND GLOWS ── */
        .bg-glow1 {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(110,231,183,0.07) 0%, transparent 70%);
            top: -150px; right: -100px;
            pointer-events: none;
        }

        .bg-glow2 {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(129,140,248,0.06) 0%, transparent 70%);
            bottom: -100px; left: -100px;
            pointer-events: none;
        }

        /* ── CARD ── */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s ease both;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
        }

        /* ── HEADER ── */
        .login-logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: -0.02em;
            color: var(--text);
            text-decoration: none;
            display: block;
            margin-bottom: 2rem;
        }

        .login-logo span { color: var(--accent); }

        .login-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.4rem;
        }

        .login-subtitle {
            color: var(--muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        /* ── ERROR ── */
        .login-error {
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.2);
            color: var(--error);
            font-size: 0.85rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ── FORM ── */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .form-input-wrap {
            position: relative;
        }

        .form-input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.85rem;
            pointer-events: none;
        }

        /* Override Django's default input rendering */
        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group input {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 300;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(110,231,183,0.1);
        }

        .form-group input::placeholder { color: var(--muted); }

        /* Hide Django's auto-generated labels inside form */
        .django-form label { display: none; }
        .django-form p { margin: 0; }

        /* ── SUBMIT ── */
        .btn-login {
            width: 100%;
            background: var(--accent);
            color: #0a0a0f;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.85rem;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.2s;
            letter-spacing: 0.01em;
        }

        .btn-login:hover {
            background: #a7f3d0;
            transform: translateY(-1px);
        }

        /* ── BACK LINK ── */
        .login-back {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .login-back a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 400;
        }

        .login-back a:hover { text-decoration: underline; }

        /* ── ANIMATION ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-glow1"></div>
    <div class="bg-glow2"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <a href="{% url 'portfolio_list' %}" class="login-logo">AM<span>.</span></a>

            <div class="login-title">Welcome back</div>
            <div class="login-subtitle">Sign in to manage your portfolio</div>

            {% if form.errors %}
            <div class="login-error">
                <i class="fas fa-circle-exclamation"></i>
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="form-input-wrap">
                        <i class="fas fa-user form-input-icon"></i>
                        <input type="text" name="username" placeholder="Enter your username" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="form-input-wrap">
                        <i class="fas fa-lock form-input-icon"></i>
                        <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>
                </div>

                <input type="hidden" name="next" value="{{ next }}" />
                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="login-back">
                <a href="{% url 'portfolio_list' %}"><i class="fas fa-arrow-left"></i> Back to portfolio</a>
            </div>
        </div>
    </div>

</body>
</html>
