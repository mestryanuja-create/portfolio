<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Project – Anuja Mestry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --card: #16161f;
            --border: #24242f;
            --accent: #6ee7b7;
            --accent2: #818cf8;
            --text: #f0f0f5;
            --muted: #8888a0;
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-weight: 300;
            min-height: 100vh;
            padding: 2rem 1.5rem 4rem;
        }

        .bg-glow1 {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(110,231,183,0.06) 0%, transparent 70%);
            top: -150px; right: -100px;
            pointer-events: none;
        }

        /* ── NAV ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 780px;
            margin: 0 auto 3rem;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
            color: var(--text);
            text-decoration: none;
        }

        .logo span { color: var(--accent); }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* ── CARD ── */
        .form-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 780px;
            margin: 0 auto;
            animation: fadeUp 0.6s ease both;
        }

        .form-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .form-tag {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .form-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* ── FIELDS ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group.full { grid-column: 1 / -1; }

        .form-label {
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .form-group input[type="text"],
        .form-group input[type="file"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 300;
            padding: 0.75rem 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(110,231,183,0.1);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder { color: var(--muted); }

        /* file input styling */
        .form-group input[type="file"] {
            color: var(--muted);
            cursor: pointer;
            padding: 0.6rem 1rem;
        }

        .form-hint {
            font-size: 0.75rem;
            color: var(--muted);
        }

        /* ── ACTIONS ── */
        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .btn-submit {
            background: var(--accent);
            color: #0a0a0f;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.75rem 2rem;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            background: #a7f3d0;
            transform: translateY(-1px);
        }

        .btn-cancel {
            background: transparent;
            color: var(--muted);
            font-family: var(--font-body);
            font-size: 0.9rem;
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            border: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
        }

        .btn-cancel:hover {
            border-color: var(--muted);
            color: var(--text);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow1"></div>

    <div class="top-bar">
        <a href="{% url 'portfolio_list' %}" class="logo">AM<span>.</span></a>
        <a href="{% url 'portfolio_list' %}" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Portfolio
        </a>
    </div>

    <div class="form-card">
        <div class="form-header">
            <div class="form-tag">New Entry</div>
            <div class="form-title">Add a Project</div>
        </div>

        <form method="post" action="" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-grid">

                <div class="form-group full">
                    <label class="form-label">Project Title</label>
                    <input type="text" name="title" placeholder="e.g. Inventory Management Dashboard" required>
                </div>

                <div class="form-group full">
                    <label class="form-label">Description</label>
                    <textarea name="description" placeholder="What problem did this solve? What was your role? What was the outcome?"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Technologies Used</label>
                    <input type="text" name="technologies" placeholder="e.g. Django, Python, JavaScript">
                    <span class="form-hint">Separate with commas or spaces</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Collaborators / Team</label>
                    <input type="text" name="collaborators" placeholder="e.g. 3-person team, Solo project">
                </div>

                <div class="form-group full">
                    <label class="form-label">Client Feedback</label>
                    <textarea name="feedback" placeholder="What did the client or stakeholder say about this project?" style="min-height:80px;"></textarea>
                </div>

                <div class="form-group full">
                    <label class="form-label">Project Image</label>
                    <input type="file" name="image" accept="image/*">
                    <span class="form-hint">JPG, PNG or GIF — recommended 800×500px</span>
                </div>

            </div>

            <div class="form-actions">
                <a href="{% url 'portfolio_list' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-plus"></i> Add Project
                </button>
            </div>
        </form>
    </div>

</body>
</html>
